name: Starter CI

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/starter-ci.yml"
      - "mini-lsm-starter/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/starter-ci.yml"
      - "mini-lsm-starter/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test mini-lsm-starter
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup toolchain install stable --profile minimal

      - name: Run tests
        run: cargo test -p mini-lsm-starter
